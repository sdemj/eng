<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erasing Game</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <style>
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; }
        body {
            font-family: 'Jua', sans-serif;
            background: #f0faff;
            background-image: radial-gradient(#fff 20%, transparent 20%);
            background-size: 40px 40px;
            color: #333;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .header-outer { position: relative; margin-bottom: 30px; display: flex; flex-direction: column; align-items: center; }
        .header-container { display: flex; align-items: center; justify-content: center; gap: 20px; }
        h1 { font-size: 3.5em; color: #ff6b6b; text-shadow: 2px 2px 0px #fff, 4px 4px 0px rgba(0,0,0,0.05); margin: 0; }

        .icon-btn {
            background: #fff; border: 3px solid #b2ebf2; border-radius: 50%;
            width: 55px; height: 55px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 26px; box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
        }
        #play-pause-btn { border-color: #ffde59; color: #f0c929; }

        .speed-container {
            background: white; padding: 20px; border-radius: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15); border: 4px solid #b2ebf2;
            display: none; position: absolute; top: 75px; z-index: 100;
            flex-direction: column; gap: 15px; min-width: 250px;
        }
        .speed-container.show { display: flex; animation: fadeInDown 0.3s ease forwards; }

        .setting-section { display: flex; flex-direction: column; gap: 8px; }
        .setting-label { font-size: 14px; color: #888; margin-left: 5px; }
        .btn-group { display: flex; gap: 8px; flex-wrap: wrap; }

        .speed-btn, .diff-btn {
            background: #f8fdff; border: 2px solid #b2ebf2; border-radius: 12px;
            padding: 8px 12px; font-family: 'Jua', sans-serif; font-size: 16px;
            cursor: pointer; transition: all 0.2s; flex: 1; text-align: center;
        }
        .speed-btn.active, .diff-btn.active { background: #ff6b6b; color: white; border-color: #ff6b6b; }

        @keyframes fadeInDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        #lyrics-container {
            background: white; border: 12px solid #ffde59; border-radius: 70px;
            padding: 40px; width: 85%; max-width: 1000px; height: 320px;
            box-shadow: 0 18px 0px #f0c929, 0 25px 40px rgba(0,0,0,0.1);
            display: flex; align-items: center; justify-content: center;
            position: relative; overflow: hidden;
        }

        .lyric-line {
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: absolute; width: 90%; font-size: 48px;
            transform: translateY(50px) scale(0.9); color: #555;
            display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; pointer-events: none;
        }
        .lyric-line.active { opacity: 1; font-size: 62px; transform: translateY(0) scale(1.05); z-index: 10; }

        .word { display: inline-block; transition: all 0.3s ease; position: relative; }
       
        .word.hidden-box {
            background: #ffde59 !important;
            border-radius: 15px;
            min-width: 120px;
            padding: 0 10px;
            height: 85px;
            box-shadow: inset 0 6px 12px rgba(0,0,0,0.1);
            color: transparent !important;
        }

        /* 정답 공개 시 사용되던 애니메이션 (로직에서 제거됨) */
        .word.reveal {
            color: #4834d4 !important;
            background: transparent !important;
            box-shadow: none !important;
            animation: bounceIn 0.5s ease forwards;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="header-outer">
        <div class="header-container">
            <h1>4. When Is Your Birthday?</h1>
            <button class="icon-btn" id="play-pause-btn">▶</button>
            <button class="icon-btn" id="toggle-speed">⚙️</button>
        </div>
       
        <div class="speed-container" id="speed-box">
            <div class="setting-section">
                <div class="setting-label">재생 속도</div>
                <div class="btn-group">
                    <button class="speed-btn" data-speed="0.5">0.5x</button>
                    <button class="speed-btn" data-speed="0.8">0.8x</button>
                    <button class="speed-btn active" data-speed="1.0">1.0x</button>
                    <button class="speed-btn" data-speed="1.2">1.2x</button>
                    <button class="speed-btn" data-speed="1.5">1.5x</button>
                </div>
            </div>
           
            <div class="setting-section">
                <div class="setting-label">가림 난이도</div>
                <div class="btn-group">
                    <button class="diff-btn active" data-level="1">level 1</button>
                    <button class="diff-btn" data-level="2">level 2</button>
                    <button class="diff-btn" data-level="all">level 3</button>
                </div>
            </div>
        </div>
    </div>

    <audio id="player" preload="metadata"><source src="Month.mp3" type="audio/mp4"></audio>
   
    <div id="lyrics-container">
        <div class="lyric-line" data-time="0">Are you ready?</div>
        <div class="lyric-line" data-time="5.55">January, February, March</div>
        <div class="lyric-line" data-time="9">April, May, June</div>
        <div class="lyric-line" data-time="13">July, August, September</div>
        <div class="lyric-line" data-time="17">October, November, December</div>
        <div class="lyric-line" data-time="21">Great!</div>
    </div>

    <script>
        const player = document.getElementById('player');
        const lines = document.querySelectorAll('.lyric-line');
        const speedBtn = document.getElementById('toggle-speed');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const speedBox = document.getElementById('speed-box');
        const speedButtons = document.querySelectorAll('.speed-btn');
        const diffButtons = document.querySelectorAll('.diff-btn');

        const BASE_DURATION = 3.6;
        let currentLevel = "1";

        function prepareQuiz() {
            lines.forEach(line => {
                const time = line.dataset.time;
                if (time !== "0" && time !== "21") {
                    const text = line.innerText;
                    const wordsText = text.split(/,\s*|\s+/).filter(w => w.length > 0);
                   
                    line.innerHTML = '';
                    wordsText.forEach((word, index) => {
                        const span = document.createElement('span');
                        span.innerText = (index < wordsText.length - 1) ? word + ',' : word;
                        span.className = 'word';
                        line.appendChild(span);
                    });
                   
                    const words = line.querySelectorAll('.word');
                    let countToHide;
                    if (currentLevel === "all") {
                        countToHide = words.length;
                    } else {
                        countToHide = Math.min(parseInt(currentLevel), words.length);
                    }

                    const indices = Array.from(Array(words.length).keys()).sort(() => Math.random() - 0.5);
                    for (let i = 0; i < countToHide; i++) {
                        const target = words[indices[i]];
                        target.dataset.targetHide = "true";
                        target.style.color = 'transparent';
                    }
                }
            });
        }

        prepareQuiz();

        playPauseBtn.addEventListener('click', () => { player.paused ? player.play() : player.pause(); });
        player.addEventListener('play', () => { playPauseBtn.innerText = '⏸'; });
        player.addEventListener('pause', () => { playPauseBtn.innerText = '▶'; });
       
        speedBtn.addEventListener('click', (e) => {
            speedBox.classList.toggle('show');
            e.stopPropagation();
        });

        speedButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                player.playbackRate = parseFloat(btn.dataset.speed);
                speedButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        diffButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                currentLevel = btn.dataset.level;
                diffButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                prepareQuiz();
            });
        });

        document.addEventListener('click', (e) => {
            if (!speedBox.contains(e.target) && e.target !== speedBtn) speedBox.classList.remove('show');
        });

        player.addEventListener('timeupdate', function() {
            const current = player.currentTime;
            const rate = player.playbackRate;
            const adjDuration = BASE_DURATION / rate;

            lines.forEach((line) => {
                const startTime = parseFloat(line.dataset.time);
                const endTime = startTime + adjDuration;

                if (current >= (startTime - 0.4) && current < endTime) {
                    if (!line.classList.contains('active')) {
                        lines.forEach(l => {
                            if (l !== line) {
                                l.classList.remove('active');
                                l.querySelectorAll('.word').forEach(w => {
                                    w.classList.remove('hidden-box', 'reveal');
                                    if(w.dataset.targetHide === "true") w.style.color = 'transparent';
                                });
                            }
                        });

                        line.querySelectorAll('.word[data-target-hide="true"]').forEach(w => {
                            w.classList.add('hidden-box');
                        });

                        line.classList.add('active');
                    }
                    // 정답 공개(Reveal) 로직이 삭제되었습니다.
                }
            });
        });

        player.addEventListener('ended', () => {
            lines.forEach(l => {
                l.classList.remove('active');
                l.querySelectorAll('.word').forEach(w => {
                    w.classList.remove('hidden-box', 'reveal');
                    if(w.dataset.targetHide === "true") w.style.color = 'transparent';
                });
            });
            playPauseBtn.innerText = '▶';
            prepareQuiz();
        });
    </script>
</body>
</html>
